name: Twice Daily Filter
on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

# This forces the new Node 24 engine across the entire workflow
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-filter:
    runs-on: ubuntu-latest
    steps:
      # Upgraded to v4.2.2 which supports Node 24
      - uses: actions/checkout@v4.2.2
      
      - name: Install Dependencies
        run: pip install requests feedparser
        
      - name: Run Filter
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python filter.py
