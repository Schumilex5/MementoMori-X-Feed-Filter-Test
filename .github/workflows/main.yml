name: Twice Daily Filter
on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  run-filter:
    runs-on: ubuntu-latest
    steps:
      # Upgrading to v6 solves the Node.js 20 deprecation correctly
      - uses: actions/checkout@v6
      
      - name: Install Dependencies
        run: pip install requests feedparser
        
      - name: Run Filter
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python filter.py
